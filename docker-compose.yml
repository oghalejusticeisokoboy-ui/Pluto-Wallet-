version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: pluto-wallet-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - pluto-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pluto-wallet-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/pluto-wallet
      JWT_SECRET: your-secret-key-here
      INFURA_API_KEY: ${INFURA_API_KEY}
      WALLET_PRIVATE_KEY: ${WALLET_PRIVATE_KEY}
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - pluto-network
    volumes:
      - ./backend:/app

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pluto-wallet-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000
      NEXT_PUBLIC_INFURA_API_KEY: ${INFURA_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pluto-network
    volumes:
      - ./frontend:/app

volumes:
  mongo_data:

networks:
  pluto-network:
    driver: bridge