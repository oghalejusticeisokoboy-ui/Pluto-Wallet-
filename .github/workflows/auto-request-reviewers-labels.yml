name: Auto request reviewers and add labels on PR

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number (optional for manual runs)'
        required: false
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  request-reviewers-and-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Request reviewers and add labels
        uses: actions/github-script@v6
        with:
          script: |
            // Configure reviewers (individuals) and team_reviewers (team slugs within the org)
            const reviewers = ["oghalejusticeisokoboy-ui"];
            const team_reviewers = ["frontend-dev","backend-dev","devops"];
            const labels = ["deploy","infra","ci","needs-review","chore"];

            // Organization slug used for logging; teams are team slugs within this org
            const orgSlug = context.repo.owner;

            // Resolve PR number from event payload or manual input
            let prNumber = undefined;
            if (context.payload.pull_request && context.payload.pull_request.number) {
              prNumber = context.payload.pull_request.number;
            } else if (context.payload.inputs && context.payload.inputs.pr_number) {
              prNumber = parseInt(context.payload.inputs.pr_number, 10);
            }

            if (!prNumber) {
              console.log('No pull request context detected. When running manually, specify the PR number via the "pr_number" input.');
              return;
            }

            // Validate individual reviewers: only keep users who are collaborators with permission to be requested
            const validReviewers = [];
            const invalidReviewers = [];

            for (const r of reviewers) {
              try {
                await github.rest.repos.checkCollaborator({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  username: r
                });
                validReviewers.push(r);
              } catch (err) {
                if (err.status === 404) {
                  invalidReviewers.push({ reviewer: r, reason: 'not a collaborator' });
                } else if (err.status === 403) {
                  invalidReviewers.push({ reviewer: r, reason: 'permission denied checking collaborator (403)' });
                } else {
                  invalidReviewers.push({ reviewer: r, reason: `check failed: ${err.message}` });
                }
              }
            }

            if (invalidReviewers.length) {
              console.log(`Some individual reviewers were not eligible and will be skipped: ${JSON.stringify(invalidReviewers)}`);
            }

            // Note: team_reviewers are team slugs within the org (org: ${orgSlug}).
            // The REST API expects team slugs (not org/team strings) in the `team_reviewers` parameter.
            if (team_reviewers.length) {
              console.log(`Requesting teams (as team slugs) in org ${orgSlug}: ${JSON.stringify(team_reviewers)}`);
            }

            // Request reviewers using only valid usernames and configured teams
            if ((validReviewers.length) || (team_reviewers.length)) {
              try {
                await github.rest.pulls.requestReviewers({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  reviewers: validReviewers,
                  team_reviewers
                });
                console.log(`Requested reviewers: ${JSON.stringify(validReviewers)} ${team_reviewers.length ? `and teams: ${JSON.stringify(team_reviewers)}` : ''}`);
              } catch (err) {
                console.warn(`Failed to request reviewers: ${err.message}`);
              }
            } else {
              console.log('No valid reviewers to request; skipping reviewer request.');
            }

            // Add labels to the PR (issues API)
            if (labels && labels.length) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels
                });
                console.log(`Added labels: ${JSON.stringify(labels)}`);
              } catch (err) {
                console.warn(`Failed to add labels: ${err.message}`);
              }
            } else {
              console.log('No labels configured; skipping label add.');
            }
